<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 메일 관리 툴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f0f10;--surface:#18181b;--surface2:#232329;--border:#2e2e38;
  --accent:#c8a96e;--accent2:#7eb8c9;--text:#e8e6e1;--text-muted:#888;--text-dim:#555;
  --red:#c97e7e;--green:#8ec97e;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-title{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.05em}
.topbar-project{font-size:12px;color:var(--text-muted);border-left:1px solid var(--border);padding-left:14px}
.topbar-project span{color:var(--text);font-weight:500}
.topbar-actions{margin-left:auto;display:flex;gap:7px;align-items:center}
.stat-chip{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:3px 9px;border-radius:20px}
.stat-chip strong{color:var(--accent)}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}
.btn-primary:hover{background:#d9bb82;color:#000}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.layout{display:flex;flex:1;height:calc(100vh - 52px);overflow:hidden;min-height:0}
.sidebar{width:208px;min-width:208px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-section{padding:12px;border-bottom:1px solid var(--border)}
.sidebar-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label-btn{font-size:10px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'IBM Plex Mono',monospace;padding:0}
.sidebar-label-btn:hover{opacity:.7}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all .12s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent)}
.nav-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)}
.tag-filter{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text-muted);transition:all .12s;user-select:none;position:relative}
.tag-filter:hover{background:var(--surface2)}
.tag-filter.active{background:var(--surface2)}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tag-actions{margin-left:auto;display:none;gap:3px;align-items:center}
.tag-filter:hover .tag-actions{display:flex}
.tag-action-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:10px;padding:2px 4px;border-radius:2px}
.tag-action-btn:hover{color:var(--text);background:var(--border)}
.year-header{padding:5px 8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:5px}
.year-header:hover{color:var(--text-muted)}
.month-item{padding:4px 8px 4px 20px;font-size:12px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;border-radius:4px;transition:all .12s}
.month-item:hover{background:var(--surface2);color:var(--text)}
.month-item.active{background:var(--surface2);color:var(--accent2)}
.month-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.search-bar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--surface);flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px 7px 30px;border-radius:4px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text-dim)}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none}
.sort-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 8px;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer}
.mail-list{flex:1;overflow-y:auto;padding:10px 12px}
.section-hdr{display:flex;align-items:center;gap:8px;padding:6px 4px 4px;margin-top:6px;margin-bottom:3px;border-bottom:1px solid var(--border)}
.section-hdr-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)}
.section-hdr-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);background:var(--surface2);padding:1px 6px;border-radius:10px}
.mail-card{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin-bottom:5px;cursor:pointer;transition:all .12s;position:relative}
.mail-card:hover{border-color:#3e3e4e;background:var(--surface2)}
.mail-card.selected{border-color:var(--accent)}
.mail-card.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent2);border-radius:5px 0 0 5px}
.mail-row1{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.mail-sender{font-size:13px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap}
.mail-subject{font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.mail-preview{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mail-footer{display:flex;align-items:center;gap:5px;margin-top:6px}
.tag{font-size:11px;padding:2px 7px;border-radius:3px;font-weight:500}
.attach-badge{font-size:10px;color:var(--text-dim);margin-left:auto}
.detail-panel{width:400px;min-width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.detail-toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.detail-content{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.detail-subject{font-size:15px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:14px}
.meta-grid{display:grid;grid-template-columns:52px 1fr;gap:5px 8px;margin-bottom:12px;font-size:12px}
.meta-key{color:var(--text-dim)}
.meta-val{color:var(--text-muted);word-break:break-all}
.divider{height:1px;background:var(--border);margin:14px 0}
.body-text{font-size:12px;color:var(--text-muted);line-height:1.8;white-space:pre-wrap;word-break:break-word}
.attach-list{margin-top:10px}
.attach-item{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;margin-bottom:4px;font-size:11px;color:var(--text-muted)}
.tag-editor{padding:10px;background:var(--surface2);border-radius:5px;margin-top:12px}
.tag-editor-label{font-size:10px;color:var(--text-dim);margin-bottom:7px;font-family:'IBM Plex Mono',monospace}
.tag-btn-group{display:flex;gap:4px;flex-wrap:wrap}
.tag-btn{font-size:11px;padding:3px 9px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:'Noto Sans KR',sans-serif}
.pending-item{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:4px;padding:9px 11px;margin-bottom:5px;font-size:13px}
.pending-item.done{border-left-color:var(--green);opacity:.6}
.pending-meta{font-size:11px;color:var(--text-dim);margin-top:3px}
.pending-check{display:flex;align-items:flex-start;gap:7px}
.pending-check input[type=checkbox]{margin-top:2px;accent-color:var(--green);cursor:pointer}
.contact-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px 12px;margin-bottom:5px;display:flex;gap:10px;align-items:center}
.contact-avatar{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--accent);flex-shrink:0}
.contact-info{flex:1}
.contact-name{font-size:13px;font-weight:500}
.contact-role{font-size:11px;color:var(--text-dim);margin-top:1px}
.contact-email{font-size:11px;color:var(--accent2);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.dropzone{border:2px dashed var(--border);border-radius:8px;padding:36px 20px;text-align:center;color:var(--text-dim);font-size:13px;transition:all .2s;cursor:pointer;margin:14px}
.dropzone:hover,.dropzone.dragover{border-color:var(--accent);color:var(--accent);background:#c8a96e06}
.dropzone-icon{font-size:28px;margin-bottom:8px}
.dropzone-sub{font-size:11px;color:var(--text-dim);margin-top:5px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text-dim);gap:8px}
.empty-icon{font-size:36px}
.empty-text{font-size:13px}
.notice{font-size:12px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:9px 12px;margin-bottom:10px;line-height:1.6}
.add-row{display:flex;gap:6px;margin-bottom:10px}
.add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none}
.add-row input:focus{border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;min-width:340px;max-width:480px;width:90%}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px;color:var(--text)}
.modal-field{margin-bottom:12px}
.modal-lbl{font-size:10px;color:var(--text-dim);margin-bottom:5px;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:4px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none}
.modal input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.color-picker-row{display:flex;gap:7px;flex-wrap:wrap}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.color-swatch.selected{border-color:#fff}
mark{background:#c8a96e33;color:var(--accent);border-radius:2px;padding:0 1px}
.tag-filter.drag-over{border:1px dashed var(--accent);background:var(--surface2)}
.tag-filter.dragging{opacity:.4}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3e3e4e}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">◈ HANDOVER</div>
  <div class="topbar-project">프로젝트: <span id="pname">미설정</span></div>
  <input id="pname-input" type="text" placeholder="프로젝트명 입력..."
    style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 9px;border-radius:4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;width:170px"
    oninput="document.getElementById('pname').textContent=this.value||'미설정';localStorage.setItem('ho_project',this.value)">
  <div class="topbar-actions">
    <div class="stat-chip">총 <strong id="total-cnt">0</strong> 건</div>
    <div class="stat-chip">미결 <strong id="pending-cnt" style="color:var(--red)">0</strong> 건</div>
    <button class="btn btn-primary" onclick="document.getElementById('fi').click()">+ EML 추가</button>
    <button class="btn" onclick="document.getElementById('di').click()">📁 폴더 추가</button>
    <button class="btn" onclick="exportData()">📤 내보내기</button>
    <button class="btn" onclick="importData()">📥 불러오기</button>
    <input type="file" id="import-input" accept=".json" hidden onchange="handleImport(this)">
    <input type="file" id="fi" accept=".eml" multiple hidden onchange="handleFiles(Array.from(this.files),null);this.value=''">
    <input type="file" id="di" webkitdirectory multiple hidden onchange="handleFolderInput(this)">
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">뷰</div>
      <div class="nav-item active" id="nav-all-btn" onclick="setView('all',this)"><span>📬</span> 전체 <span class="nav-count" id="nav-all">0</span></div>
      <div class="nav-item" id="nav-pending-btn" onclick="setView('pending',this)"><span>⚠️</span> 미결사항 <span class="nav-count" id="nav-pending" style="color:var(--red)">0</span></div>
      <div class="nav-item" id="nav-contacts-btn" onclick="setView('contacts',this)"><span>👤</span> 관계자</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">카테고리 <button class="sidebar-label-btn" onclick="openAddCat()">+ 추가</button></div>
      <div id="tag-filters"></div>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">연월별</div>
      <div id="month-tree"></div>
    </div>
  </div>
  <div class="main">
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="제목, 발신자, 본문 검색..." oninput="renderList()">
      </div>
      <select class="sort-select" id="sort-sel" onchange="renderList()">
        <option value="date-desc">날짜 최신순</option>
        <option value="date-asc">날짜 오래된순</option>
        <option value="sender">발신자순</option>
      </select>
    </div>
    <div id="main-area" class="mail-list" style="flex:1;overflow-y:auto"></div>
    <!-- 타임라인 패널 -->
    <div id="timeline-panel" style="height:160px;min-height:130px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden">
      <div style="display:flex;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.08em">TIMELINE</span>
        <div id="tl-legend" style="display:flex;gap:10px;flex-wrap:wrap"></div>
        <span id="tl-hover-info" style="margin-left:auto;font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px"></span>
      </div>
      <div style="flex:1;overflow-x:auto;overflow-y:hidden;padding:8px 14px;position:relative" id="tl-scroll">
        <canvas id="tl-canvas" style="display:block"></canvas>
      </div>
    </div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="empty-state" style="height:100%">
      <div class="empty-icon">✉️</div>
      <div class="empty-text">이메일을 선택하면 내용이 표시됩니다</div>
    </div>
  </div>
</div>
<!-- 저장 모달 -->
<div class="modal-overlay" id="save-modal" style="display:none" onclick="if(event.target===this)closeSaveModal()">
  <div class="modal" style="min-width:400px">
    <h3>💾 저장 옵션</h3>
    <div class="modal-field">
      <div class="modal-lbl">파일명</div>
      <input type="text" id="save-filename" placeholder="파일명 입력..." oninput="updateSavePreview()">
    </div>
    <div class="modal-field">
      <div class="modal-lbl">저장 경로</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="text" id="save-path-display" placeholder="브라우저 기본 다운로드 폴더" readonly
          style="background:var(--surface);color:var(--text-dim);cursor:default">
        <button class="btn" onclick="selectSavePath()" style="white-space:nowrap;flex-shrink:0">📁 변경</button>
      </div>
      <div id="save-path-note" style="font-size:10px;color:var(--text-dim);margin-top:5px;line-height:1.5">
        브라우저 보안 정책으로 경로 직접 지정은 제한됩니다.<br>
        [변경] 클릭 시 브라우저 설정에서 다운로드 위치를 변경하거나, 저장 후 이동하세요.
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-lbl">저장 옵션</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer">
          <input type="checkbox" id="save-with-body" checked style="accent-color:var(--accent)" onchange="updateSavePreview()">
          이메일 본문 포함 (파일 크기 증가)
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer">
          <input type="checkbox" id="save-with-attach-list" checked style="accent-color:var(--accent)" onchange="updateSavePreview()">
          첨부파일 목록 포함
        </label>
      </div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-size:11px;color:var(--text-dim);margin-top:4px">
      <div id="save-preview-info" style="line-height:1.7"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSaveModal()">취소</button>
      <button class="btn btn-primary" onclick="doExport()">💾 저장</button>
    </div>
  </div>
</div>

<!-- 카테고리 모달 -->
<div class="modal-overlay" id="cat-modal" style="display:none" onclick="if(event.target===this)closeCat()">
  <div class="modal">
    <h3 id="cat-modal-title">카테고리 추가</h3>
    <div class="modal-field">
      <div class="modal-lbl">명칭</div>
      <input type="text" id="cat-name" placeholder="예: 구조설계, 소방, 토목..." maxlength="12">
    </div>
    <div class="modal-field">
      <div class="modal-lbl">색상</div>
      <div class="color-picker-row" id="color-picker"></div>
    </div>
    <div class="modal-field">
      <div class="modal-lbl">자동분류 키워드 (쉼표 구분)</div>
      <input type="text" id="cat-keywords" placeholder="예: 구조,골조,기초">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCat()">취소</button>
      <button class="btn btn-primary" id="cat-ok" onclick="saveCat()">추가</button>
    </div>
  </div>
</div>
<script>
const PRESET_COLORS=['#c8a96e','#7eb8c9','#c97e7e','#8ec97e','#a07ec9','#c9b47e','#7ec9b4','#c97ea0','#7e9bc9','#e8857a','#7ac8c4','#b07ae8','#e8c47a','#aaaaaa'];
let emails=[],pending=[],contacts=[],categories=[],selectedId=null,currentView='all',activeTag=null,activeMonth=null,editCatId=null,selColor=PRESET_COLORS[0],nextId=1;

function defaultCats(){return[
  {id:1,name:'\uC778\uD5C8\uAC00',color:'#c8a96e',keywords:['\uC778\uD5C8\uAC00','\uD5C8\uAC00','\uC2E0\uACE0','\uC2B9\uC778','\uD611\uC758','\uC778\uAC00']},

// ─── EML 파싱 ───
function decHdr(s){
  if(!s)return'';
  return s.replace(/=\?([^?]+)\?([BbQq])\?([^?]*)\?=/g,function(_,cs,enc,data){
    try{
      if(enc.toUpperCase()==='B'){
        var b=Uint8Array.from(atob(data.replace(/\s/g,'')),function(c){return c.charCodeAt(0);});
        return new TextDecoder(cs).decode(b);
      }else{
        var qp=data.replace(/_/g,' ').replace(/=([0-9A-Fa-f]{2})/g,function(_,h){return String.fromCharCode(parseInt(h,16));});
        try{return new TextDecoder(cs).decode(new Uint8Array(Array.from(qp,function(c){return c.charCodeAt(0);})));}catch{return qp;}
      }
    }catch{return data;}
  });
}
function getCharset(ct){
  var m=(ct||'').match(/charset=["']?([^"';\s\r\n]+)/i);
  if(!m)return'utf-8';
  return m[1].toLowerCase().replace('ks_c_5601-1987','euc-kr').replace('ksc5601','euc-kr');
}
function decQP(s){return s.replace(/=\r?\n/g,'').replace(/=([0-9A-Fa-f]{2})/g,function(_,h){return String.fromCharCode(parseInt(h,16));});}
function decB64(s,cs){
  try{
    var b=Uint8Array.from(atob(s.replace(/\s/g,'')),function(c){return c.charCodeAt(0);});
    return new TextDecoder(cs||'utf-8').decode(b);
  }catch(e){return s;}
}
function stripHtml(h){
  return h.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
    .replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"')
    .replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
}
function parseHdrs(block){
  var h={},cur=null;
  block.split('\n').forEach(function(line){
    if(/^[ \t]/.test(line)&&cur){h[cur]+=' '+line.trim();return;}
    var ci=line.indexOf(':');
    if(ci>0){cur=line.slice(0,ci).toLowerCase().trim();h[cur]=line.slice(ci+1).trim();}
  });
  return h;
}
function decodeBody(body,cte,cs){
  var enc=(cte||'').toLowerCase().trim();
  if(enc==='base64')return decB64(body,cs);
  if(enc==='quoted-printable'){
    var qp=decQP(body);
    try{return new TextDecoder(cs||'utf-8').decode(new Uint8Array(Array.from(qp,function(c){return c.charCodeAt(0);})));}catch{return qp;}
  }
  try{return new TextDecoder(cs||'utf-8',{fatal:false}).decode(new Uint8Array(Array.from(body,function(c){return c.charCodeAt(0);})));}catch{return body;}
}
function extractText(raw,ct,cte,cs){
  var bm=(ct||'').match(/boundary=["']?([^"';\s\r\n]+)/i);
  if(bm){
    var bdry=bm[1],sep='--'+bdry,chunks=raw.split(sep);
    var textPlain='',textHtml='';
    for(var i=1;i<chunks.length;i++){
      var chunk=chunks[i];
      if(chunk.startsWith('--'))break;
      var nl2=chunk.search(/\n\n/);
      if(nl2===-1)continue;
      var ph=parseHdrs(chunk.slice(0,nl2).replace(/^\n/,''));
      var pb=chunk.slice(nl2+2);
      var pct=ph['content-type']||'';
      var pcte=ph['content-transfer-encoding']||'';
      var pcs=getCharset(pct);
      if(pct.includes('text/plain')&&!textPlain){textPlain=decodeBody(pb,pcte,pcs);}
      else if(pct.includes('text/html')&&!textHtml){textHtml=stripHtml(decodeBody(pb,pcte,pcs));}
      else if(pct.includes('multipart')){var r=extractText(pb,pct,'',pcs);if(r)return r;}
    }
    return textPlain||textHtml||'';
  }
  var decoded=decodeBody(raw,cte,cs);
  if((ct||'').includes('text/html'))decoded=stripHtml(decoded);
  return decoded;
}
function autoTag(text){
  var t=(text||'').toLowerCase();
  for(var i=0;i<categories.length;i++){
    var cat=categories[i];
    if(cat.keywords&&cat.keywords.some(function(k){return k&&t.includes(k.toLowerCase());}))return cat.name;
  }
  return categories[categories.length-1]?categories[categories.length-1].name:'\uAE30\uD0C0';
}
function parseEML(raw,filename,forceCat){
  var norm=raw.replace(/\r\n/g,'\n');
  var si=norm.search(/\n\n/);
  var hBlock=si>=0?norm.slice(0,si):norm;
  var bodyRaw=si>=0?norm.slice(si+2):'';
  var h=parseHdrs(hBlock);
  var ct=h['content-type']||'text/plain';
  var cs=getCharset(ct);
  var cte=h['content-transfer-encoding']||'';
  var subject=decHdr(h['subject']||filename);
  var from=decHdr(h['from']||'');
  var to=decHdr(h['to']||'');
  var rawDate=h['date']||'';
  var date=rawDate?new Date(rawDate):new Date();
  if(isNaN(date))date=new Date();
  var body=extractText(bodyRaw,ct,cte,cs);
  var attachments=[];
  var fnRe=/filename\*?=["']?([^"'\r\n;]+)/gi,m;
  while((m=fnRe.exec(raw))!==null){
    var fn=decHdr(m[1].trim()).replace(/^utf-8''/i,'');
    if(fn&&fn.length<200&&!attachments.includes(fn))attachments.push(fn);
  }
  var tag=forceCat||autoTag(subject+' '+body.slice(0,500));
  return{id:nextId++,filename,from,to,subject,date:date.toISOString(),body:body.slice(0,4000),attachments:attachments.slice(0,20),tag,read:false,memo:''};
}

// ─── 파일 처리 ───
async function readBinary(file){
  return new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result);};r.onerror=rej;r.readAsBinaryString(file);});
}
async function handleFiles(files,forceCat){
  var emls=files.filter(function(f){return f.name.toLowerCase().endsWith('.eml');});
  if(!emls.length)return;
  for(var i=0;i<emls.length;i++){
    try{
      var raw=await readBinary(emls[i]);
      var parsed=parseEML(raw,emls[i].name,forceCat);
      var dup=emails.find(function(e){return e.filename===parsed.filename&&e.date===parsed.date;});
      if(!dup)emails.unshift(parsed);
    }catch(err){console.warn('EML error:',emls[i].name,err);}
  }
  saveStorage();render();
}
async function handleFolderInput(input){
  var allFiles=Array.from(input.files);
  var folderMap={};
  allFiles.forEach(function(f){
    if(!f.name.toLowerCase().endsWith('.eml'))return;
    var parts=f.webkitRelativePath.split('/');
    var catName=parts.length>=2?parts[parts.length-2]:null;
    if(!folderMap[catName||''])folderMap[catName||'']=[];
    folderMap[catName||''].push(f);
  });
  for(var fn in folderMap){
    if(fn){
      var cat=categories.find(function(c){return c.name===fn;});
      if(!cat){
        var color=PRESET_COLORS[categories.length%PRESET_COLORS.length];
        cat={id:nextId++,name:fn,color:color,keywords:[]};
        categories.push(cat);
      }
      await handleFiles(folderMap[fn],cat.name);
    }else{
      await handleFiles(folderMap[fn],null);
    }
  }
  input.value='';
  saveStorage();render();
}
async function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropzone')&&document.getElementById('dropzone').classList.remove('dragover');
  var files=Array.from(e.dataTransfer.files);
  if(e.dataTransfer.items){
    var entries=[];
    for(var i=0;i<e.dataTransfer.items.length;i++){
      var it=e.dataTransfer.items[i];
      if(it.webkitGetAsEntry)entries.push(it.webkitGetAsEntry());
    }
    if(entries.some(function(en){return en&&en.isDirectory;})){
      var allF=await readDirEntries(entries);
      var fm={};
      allF.forEach(function(x){
        var parts=x.path.split('/');
        var cn=parts.length>=2?parts[parts.length-2]:null;
        if(!fm[cn||''])fm[cn||'']=[];
        fm[cn||''].push(x.file);
      });
      for(var fn2 in fm){
        if(fn2){
          var cat2=categories.find(function(c){return c.name===fn2;});
          if(!cat2){var col=PRESET_COLORS[categories.length%PRESET_COLORS.length];cat2={id:nextId++,name:fn2,color:col,keywords:[]};categories.push(cat2);}
          await handleFiles(fm[fn2],cat2.name);
        }else{await handleFiles(fm[fn2],null);}
      }
      return;
    }
  }
  await handleFiles(files,null);
}
function readDirEntries(entries){
  return new Promise(function(resolve){
    var results=[],pend=0;
    function readEntry(en,prefix){
      if(en.isFile){pend++;en.file(function(f){results.push({file:f,path:prefix+f.name});pend--;if(!pend)resolve(results);});}
      else if(en.isDirectory){pend++;var rd=en.createReader();rd.readEntries(function(sub){pend--;sub.forEach(function(s){readEntry(s,prefix+en.name+'/');});if(!pend)resolve(results);});}
    }
    if(!entries.length){resolve([]);return;}
    entries.forEach(function(en){if(en)readEntry(en,'');});
  });
}

// ─── 뷰 ───
function setView(v,el){
  currentView=v;activeTag=null;activeMonth=null;
  document.querySelectorAll('.nav-item,.tag-filter,.month-item').forEach(function(n){n.classList.remove('active');});
  if(el)el.classList.add('active');
  render();
}
function filterByTag(name,el){
  currentView='all';activeTag=activeTag===name?null:name;activeMonth=null;
  document.querySelectorAll('.nav-item,.tag-filter,.month-item').forEach(function(n){n.classList.remove('active');});
  if(activeTag)el.classList.add('active');
  else document.getElementById('nav-all-btn').classList.add('active');
  render();
}
function filterByMonth(ym,el){
  currentView='all';activeTag=null;activeMonth=activeMonth===ym?null:ym;
  document.querySelectorAll('.nav-item,.tag-filter,.month-item').forEach(function(n){n.classList.remove('active');});
  if(activeMonth)el.classList.add('active');
  else document.getElementById('nav-all-btn').classList.add('active');
  render();
}
function getFiltered(){
  var q=(document.getElementById('search-input').value||'').trim().toLowerCase();
  var list=emails.slice();
  if(activeTag)list=list.filter(function(e){return e.tag===activeTag;});
  if(activeMonth)list=list.filter(function(e){return e.date&&e.date.startsWith(activeMonth);});
  if(q)list=list.filter(function(e){return(e.subject||'').toLowerCase().includes(q)||(e.from||'').toLowerCase().includes(q)||(e.body||'').toLowerCase().includes(q);});
  var sort=document.getElementById('sort-sel').value;
  if(sort==='date-desc')list.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  else if(sort==='date-asc')list.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  else list.sort(function(a,b){return(a.from||'').localeCompare(b.from||'');});
  return list;
}

function renderList(){
  var area=document.getElementById('main-area');
  if(emails.length===0){
    area.innerHTML='<div class="dropzone" id="dropzone" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="handleDrop(event)" onclick="document.getElementById(\'fi\').click()"><div class="dropzone-icon">\uD83D\uDCC2</div><div>EML \uD30C\uC77C\uC744 \uB4DC\uB798\uADF8\uD558\uAC70\uB098 \uD074\uB9AD</div><div class="dropzone-sub">\uD3F4\uB354 \uB2E8\uC704 \uC5C5\uB85C\uB4DC\uB294 [\uD3F4\uB354 \uCD94\uAC00] \uBC84\uD2BC \uC0AC\uC6A9</div></div>';
    return;
  }
  var list=getFiltered();
  var q=(document.getElementById('search-input').value||'').trim();
  if(list.length===0){area.innerHTML='<div class="empty-state"><div class="empty-icon">\uD83D\uDD0D</div><div class="empty-text">\uAC80\uC0C9 \uACB0\uACFC \uC5C6\uC74C</div></div>';return;}
  var groups={};
  list.forEach(function(e){var d=new Date(e.date);var k=d.getFullYear()+'\uB144 '+String(d.getMonth()+1).padStart(2,'0')+'\uC6D4';if(!groups[k])groups[k]=[];groups[k].push(e);});
  var html='';
  Object.keys(groups).forEach(function(gk){
    html+='<div class="section-hdr"><span class="section-hdr-label">'+gk+'</span><span class="section-hdr-count">'+groups[gk].length+'\uAC74</span></div>';
    groups[gk].forEach(function(e){
      var d=new Date(e.date);var ds=(d.getMonth()+1)+'/'+(d.getDate());
      var cat=categories.find(function(c){return c.name===e.tag;})||{color:'#888'};
      var ts='background:'+cat.color+'22;color:'+cat.color;
      var ab=e.attachments.length?'<span class="attach-badge">\uD83D\uDCCE'+e.attachments.length+'</span>':'';
      html+='<div class="mail-card '+(e.read?'':'unread')+(selectedId===e.id?' selected':'')+'" data-id="'+e.id+'" onclick="selectMail('+e.id+')">'         +'<div class="mail-row1"><div class="mail-sender">'+hl(sn(e.from),q)+'</div><div class="mail-date">'+ds+'</div>'+ab+'</div>'
        +'<div class="mail-subject">'+hl(esc(e.subject||'(\uC81C\uBAA9\uC5C6\uC74C)'),q)+'</div>'
        +'<div class="mail-preview">'+hl(esc((e.body||'').slice(0,80)),q)+'</div>'
        +'<div class="mail-footer"><span class="tag" style="'+ts+'">'+esc(e.tag)+'</span></div></div>';
    });
  });
  area.innerHTML=html;
}
function hl(t,q){if(!q)return t;var re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');return t.replace(re,function(m){return'<mark>'+m+'</mark>';});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sn(from){if(!from)return'\uC54C \uC218 \uC5C6\uC74C';var m=from.match(/^([^<]+)</);if(m)return m[1].trim().replace(/"/g,'');return from.replace(/<[^>]+>/,'').trim()||from;}
function fd(iso){if(!iso)return'';var d=new Date(iso);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}

// ─── 상세 ───
function selectMail(id){
  var listArea = document.getElementById('main-area');

  // ① 목록 스크롤 위치 기억 (렌더 전에 반드시 먼저)
  var savedScroll = listArea ? listArea.scrollTop : 0;

  selectedId = id;
  var e = emails.find(function(x){ return x.id===id; });
  if(!e) return;
  e.read = true;
  saveStorage();

  // ② 선택 상태를 data-id 기준으로 업데이트 (재렌더 없이)
  document.querySelectorAll('.mail-card').forEach(function(el){
    var eid = parseInt(el.getAttribute('data-id'));
    el.classList.toggle('selected', eid === id);
    if(eid === id) el.classList.remove('unread');
  });

  // ③ 목록 스크롤 즉시 복원 (브라우저가 레이아웃 변경 전에 적용)
  if(listArea) listArea.scrollTop = savedScroll;

  // ④ 상세 패널 렌더 (목록 스크롤과 독립)
  renderDetail(e);

  // ⑤ 렌더 후에도 스크롤 위치 재확인 (innerHTML 교체로 튀는 경우 대비)
  requestAnimationFrame(function(){
    if(listArea) listArea.scrollTop = savedScroll;
    renderTimeline(); // 선택된 메일 도트 강조 갱신
  });
}

    +'<button class="btn" onclick="deleteEmail('+e.id+')">\uD83D\uDDD1 \uC0AD\uC81C</button>'
    +'<button class="btn" onclick="addPending('+e.id+')">\u26A0\uFE0F \uBBF8\uACB0 \uB4F1\uB85D</button>'

    +'</div>'
    +'<div class="detail-content">'
    +'<div class="detail-subject">'+esc(e.subject||'(\uC81C\uBAA9\uC5C6\uC74C)')+'</div>'
    +'<div class="meta-grid">'
    +'<div class="meta-key">\uBC1C\uC2E0</div><div class="meta-val">'+esc(e.from)+'</div>'
    +'<div class="meta-key">\uC218\uC2E0</div><div class="meta-val">'+esc(e.to)+'</div>'
    +'<div class="meta-key">\uB0A0\uC9DC</div><div class="meta-val">'+ds+'</div>'
    +'<div class="meta-key">\uD30C\uC77C</div><div class="meta-val" style="font-size:10px;color:var(--text-dim)">'+esc(e.filename)+'</div>'
    +'</div>'
    +(attH?'<div class="attach-list">'+attH+'</div>':'')

function saveMemo(id,val){var e=emails.find(function(x){return x.id===id;});if(e){e.memo=val;saveStorage();}}
function deleteEmail(id){

// ─── 타임라인 (도트 타임라인) ───
var tlDotMap = []; // {x, y, email} for hover/click

function renderTimeline(){
  var canvas = document.getElementById('tl-canvas');
  var scroll = document.getElementById('tl-scroll');
  var legend = document.getElementById('tl-legend');
  if(!canvas) return;

  if(!emails.length){
    var ctx0 = canvas.getContext('2d');
    canvas.width = scroll.clientWidth || 600;
    canvas.height = scroll.clientHeight || 100;
    ctx0.fillStyle = '#444';
    ctx0.font = '12px Noto Sans KR,sans-serif';
    ctx0.textAlign = 'center';
    ctx0.fillText('EML 파일을 불러오면 타임라인이 표시됩니다', canvas.width/2, canvas.height/2);
    legend.innerHTML = '';
    return;
  }

  var allDates = emails.map(function(e){ return new Date(e.date); }).filter(function(d){ return !isNaN(d); });
  if(!allDates.length) return;

  var minDate = new Date(Math.min.apply(null, allDates));
  var maxDate = new Date(Math.max.apply(null, allDates));
  // 범위가 같은 날이면 ±1일 여유
  if(minDate.getTime() === maxDate.getTime()){
    minDate = new Date(minDate.getTime() - 86400000);
    maxDate = new Date(maxDate.getTime() + 86400000);
  }
  // 월 단위로 스냅
  minDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 0);

  var PADDING_L = 8, PADDING_R = 20;
  var H = scroll.clientHeight || 110;
  var AXIS_Y = H - 22;   // 날짜축 Y
  var DOT_AREA_TOP = 8;  // 도트 영역 상단
  var DOT_AREA_H = AXIS_Y - DOT_AREA_TOP - 6;

  // 전체 기간의 월 목록 생성
  var months = [];
  var mc = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  while(mc <= maxDate){
    months.push(new Date(mc));
    mc.setMonth(mc.getMonth() + 1);
  }

  var MONTH_W = Math.max(52, Math.floor((scroll.clientWidth - PADDING_L - PADDING_R - 40) / Math.max(months.length, 1)));
  var totalW = Math.max(PADDING_L + months.length * MONTH_W + PADDING_R, scroll.clientWidth || 600);

  canvas.width = totalW;
  canvas.height = H;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, totalW, H);

  var totalMs = maxDate.getTime() - minDate.getTime();
  function dateToX(d){
    return PADDING_L + ((d.getTime() - minDate.getTime()) / totalMs) * (totalW - PADDING_L - PADDING_R);
  }

  // 격선 & 월 레이블
  ctx.strokeStyle = '#2a2a35';
  ctx.lineWidth = 1;
  months.forEach(function(m){
    var x = dateToX(m);
    ctx.beginPath(); ctx.moveTo(x, DOT_AREA_TOP); ctx.lineTo(x, AXIS_Y); ctx.stroke();
    ctx.fillStyle = '#555';
    ctx.font = '9px IBM Plex Mono,monospace';
    ctx.textAlign = 'left';
    // 연도 표시: 1월이거나 첫 달
    var label = (m.getMonth() === 0)
      ? m.getFullYear() + '.' + String(m.getMonth()+1).padStart(2,'0')
      : String(m.getMonth()+1) + '월';
    ctx.fillText(label, x + 3, H - 6);
  });

  // 축선
  ctx.strokeStyle = '#333340';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PADDING_L, AXIS_Y); ctx.lineTo(totalW - PADDING_R, AXIS_Y); ctx.stroke();

  // 카테고리별 레인 높이 계산 (균등 분할)
  var activeCats = categories.filter(function(c){
    return emails.some(function(e){ return e.tag === c.name; });
  });
  var laneH = activeCats.length > 0 ? DOT_AREA_H / activeCats.length : DOT_AREA_H;

  // 도트 그리기
  tlDotMap = [];
  var DOT_R = 4;

  activeCats.forEach(function(cat, li){
    var laneY = DOT_AREA_TOP + li * laneH + laneH / 2;
    var catEmails = emails.filter(function(e){ return e.tag === cat.name; });

    // 같은 날짜 겹침 처리: x좌표 기준으로 그루핑
    var xGroups = {};
    catEmails.forEach(function(e){
      var d = new Date(e.date);
      if(isNaN(d)) return;
      var x = Math.round(dateToX(d));
      if(!xGroups[x]) xGroups[x] = [];
      xGroups[x].push(e);
    });

    Object.keys(xGroups).forEach(function(xStr){
      var gx = parseInt(xStr);
      var grp = xGroups[xStr];
      grp.forEach(function(e, gi){
        var offsetY = (grp.length > 1) ? (gi - (grp.length-1)/2) * (DOT_R*2+1) : 0;
        var dotY = laneY + offsetY;

        // 선택된 메일 강조
        var isSelected = (e.id === selectedId);
        ctx.beginPath();
        ctx.arc(gx, dotY, isSelected ? DOT_R + 2 : DOT_R, 0, Math.PI * 2);
        ctx.fillStyle = cat.color;
        ctx.globalAlpha = isSelected ? 1.0 : (e.read ? 0.55 : 0.9);
        ctx.fill();
        ctx.globalAlpha = 1;

        if(isSelected){
          ctx.beginPath();
          ctx.arc(gx, dotY, DOT_R + 4, 0, Math.PI * 2);
          ctx.strokeStyle = cat.color;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        tlDotMap.push({ x: gx, y: dotY, r: DOT_R + 4, email: e });
      });
    });
  });

  // 범례
  legend.innerHTML = activeCats.map(function(c){
    return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim)">'
      + '<span style="width:7px;height:7px;border-radius:50%;background:'+c.color+';display:inline-block"></span>'
      + c.name + '</span>';
  }).join('');
}

// 타임라인 캔버스 이벤트
(function(){
  var lastHover = null;
  function getHitDot(cx, cy){
    for(var i = tlDotMap.length - 1; i >= 0; i--){
      var d = tlDotMap[i];
      var dx = cx - d.x, dy = cy - d.y;
      if(dx*dx + dy*dy <= d.r * d.r) return d;
    }
    return null;
  }
  document.addEventListener('DOMContentLoaded', function(){
    var canvas = document.getElementById('tl-canvas');
    var scroll = document.getElementById('tl-scroll');
    var info = document.getElementById('tl-hover-info');
    if(!canvas) return;

    canvas.style.cursor = 'default';

    canvas.addEventListener('mousemove', function(e){
      var rect = canvas.getBoundingClientRect();
      var cx = e.clientX - rect.left + scroll.scrollLeft;
      var cy = e.clientY - rect.top;
      var hit = getHitDot(cx, cy);
      if(hit){
        canvas.style.cursor = 'pointer';
        if(lastHover !== hit.email.id){
          lastHover = hit.email.id;
          var em = hit.email;
          var d = new Date(em.date);
          var ds = d.getFullYear()+'.'+(d.getMonth()+1)+'.'+(d.getDate());
          info.textContent = '[' + (em.tag||'') + ']  ' + ds + '  ' + (em.from ? em.from.replace(/<[^>]+>/g,'').trim() : '') + '  — ' + (em.subject||'(제목없음)');
        }
      } else {
        canvas.style.cursor = 'default';
        if(lastHover !== null){ lastHover = null; info.textContent = ''; }
      }
    });

    canvas.addEventListener('mouseleave', function(){
      lastHover = null;
      var info = document.getElementById('tl-hover-info');
      if(info) info.textContent = '';
    });

    canvas.addEventListener('click', function(e){
      var rect = canvas.getBoundingClientRect();
      var cx = e.clientX - rect.left + scroll.scrollLeft;
      var cy = e.clientY - rect.top;
      var hit = getHitDot(cx, cy);
      if(hit){
        // 전체 뷰로 전환 후 해당 메일 선택
        if(currentView !== 'all'){
          currentView = 'all'; activeTag = null; activeMonth = null;
          document.querySelectorAll('.nav-item,.tag-filter,.month-item').forEach(function(n){n.classList.remove('active');});
          var allBtn = document.getElementById('nav-all-btn');
          if(allBtn) allBtn.classList.add('active');
          render();
        }
        setTimeout(function(){
          selectMail(hit.email.id);
          var card = document.querySelector('.mail-card[data-id="'+hit.email.id+'"]');
          if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
        }, 30);
      }
    });
  });
})();

  var withBody = document.getElementById('save-with-body').checked;
  var withAttach = document.getElementById('save-with-attach-list').checked;
  var estSize = emails.length * (withBody ? 3 : 0.3) + 'KB 내외 (예상)';
  var info = document.getElementById('save-preview-info');
  if(info){
    info.innerHTML =
      '이메일: <strong style="color:var(--accent)">'+emails.length+'</strong>건 &nbsp;|&nbsp; '
      +'미결사항: <strong style="color:var(--red)">'+pending.filter(function(p){return!p.done;}).length+'</strong>건 &nbsp;|&nbsp; '
      +'관계자: <strong style="color:var(--accent2)">'+contacts.length+'</strong>명<br>'
      +'카테고리: '+categories.length+'개 &nbsp;|&nbsp; '
      +'예상 크기: '+estSize;
  }
}

function closeSaveModal(){
  document.getElementById('save-modal').style.display='none';
}

function selectSavePath(){
  // 브라우저 다운로드 설정 열기 안내
  var ua = navigator.userAgent;
  var isChrome = ua.includes('Chrome');
  var isEdge = ua.includes('Edg');
  if(isChrome || isEdge){
    if(confirm('브라우저 다운로드 설정 페이지를 열까요?\n저장 위치를 변경하거나 "항상 저장 위치 확인" 옵션을 켜면 파일 저장 시 경로를 선택할 수 있습니다.')){
      if(isEdge) window.open('edge://settings/downloads','_blank');
      else window.open('chrome://settings/downloads','_blank');
    }
  } else {
    alert('브라우저 설정 > 다운로드에서 "항상 저장 위치 확인" 옵션을 활성화하면\n파일 저장 시 경로를 직접 선택할 수 있습니다.');
  }
}

function doExport(){
  var filename = document.getElementById('save-filename').value.trim();
  if(!filename){ alert('파일명을 입력하세요'); return; }
  if(!filename.endsWith('.json')) filename += '.json';

  var withBody = document.getElementById('save-with-body').checked;
  var withAttach = document.getElementById('save-with-attach-list').checked;

  var data={
    _version: 2,
    project: document.getElementById('pname-input').value,
    exportedAt: new Date().toISOString(),
    categories: categories,
    emails: emails.map(function(e){
      var o={id:e.id,date:e.date,from:e.from,to:e.to,subject:e.subject,tag:e.tag,memo:e.memo,read:e.read,filename:e.filename};
      if(withBody) o.body=e.body;
      if(withAttach) o.attachments=e.attachments;
      return o;
    }),
    pending: pending,
    contacts: contacts
  };
  var json = JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  URL.revokeObjectURL(url);
  closeSaveModal();
  showToast('저장 완료 — '+filename+' ('+emails.length+'건)');
}

function importData(){
  if(emails.length>0){
    if(!confirm('현재 데이터에 덮어씁니까?\n(취소 시 기존 데이터 유지)')) return;
  }
  document.getElementById('import-input').click();
}

function handleImport(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!data.emails) throw new Error('올바른 인수인계 파일이 아닙니다');
      // 복원
      emails    = data.emails    || [];
      pending   = data.pending   || [];
      contacts  = data.contacts  || [];
      categories= data.categories|| defaultCats();
      nextId    = Math.max.apply(null,
        emails.map(function(x){return x.id||0;})
        .concat(pending.map(function(x){return x.id||0;}))
        .concat(contacts.map(function(x){return x.id||0;}))
        .concat([0])
      ) + 1;
      // 본문 없는 경우 빈 문자열로
      emails.forEach(function(em){if(!em.body)em.body='(본문 미포함 — EML 재불러오기 필요)';});
      var pname = data.project||'';
      if(pname){
        document.getElementById('pname').textContent=pname;
        document.getElementById('pname-input').value=pname;
        localStorage.setItem('ho_project',pname);
      }
      saveStorage();
      render();
      showToast('불러오기 완료 — ' + emails.length + '건 이메일, ' + (data.exportedAt?new Date(data.exportedAt).toLocaleString('ko-KR'):'')+'  저장본');
    }catch(err){
      alert('파일 오류: '+err.message);
    }
    input.value='';
  };
  reader.readAsText(file,'utf-8');
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#232329;border:1px solid #c8a96e;color:#e8e6e1;padding:10px 20px;border-radius:6px;font-size:13px;z-index:999;pointer-events:none;transition:opacity .3s;font-family:Noto Sans KR,sans-serif;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.style.opacity='0';},3000);
}

loadStorage();render();window.addEventListener('resize',function(){renderTimeline();});
</script>
